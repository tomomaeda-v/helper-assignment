<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訪問介護 担当割り振り確認ツール</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  :root{
    --bg:#eef1f6; --panel:#ffffff; --ink:#1c2430; --sub:#69737f;
    --line:#e4e8ee; --accent:#2563eb; --accent-soft:#dbeafe;
    --futa:#0d9488; --futa-soft:#ccfbf1; --yoga:#b91c1c; --yoga-soft:#fee2e2;
    --warn:#dc2626; --unassigned:#db2777; --unassigned-soft:#fce7f3; --drop:#bfdbfe;
    --user:#2563eb; --helper:#0d9488;
    --ok:#16a34a; --ok-soft:#dcfce7; --med:#d97706;
    --r-lg:20px; --r-md:14px; --r-sm:10px;
    --shadow-sm:0 1px 2px rgba(16,24,40,.05);
    --shadow-md:0 2px 6px rgba(16,24,40,.05), 0 12px 32px rgba(16,24,40,.07);
    --font-head:"Zen Maru Gothic","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  }
  body{ font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:var(--ink); font-size:14.5px; line-height:1.55;
    background:var(--bg);
    background-image:radial-gradient(1200px 500px at 85% -10%, rgba(37,99,235,.07), transparent 60%),
                     radial-gradient(900px 420px at -10% 0%, rgba(13,148,136,.06), transparent 55%);
    background-attachment:fixed; }
  ::-webkit-scrollbar{ width:9px; height:9px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  ::-webkit-scrollbar-thumb{ background:#ccd3dd; border-radius:8px; border:2px solid transparent; background-clip:content-box; }
  ::-webkit-scrollbar-thumb:hover{ background:#aeb8c6; }
  #gate{ position:fixed; inset:0; background:linear-gradient(150deg,#1e3a8a 0%,#1d4ed8 45%,#0f766e 100%); display:flex; align-items:center; justify-content:center; z-index:100; }
  .gate-card{ background:rgba(255,255,255,.94); backdrop-filter:blur(8px); border-radius:24px; padding:38px 34px; width:360px; max-width:90vw; box-shadow:0 24px 60px rgba(2,6,23,.45); text-align:center; }
  .gate-card h2{ font-family:var(--font-head); font-size:18px; margin-bottom:4px; }
  .gate-card p{ font-size:12px; color:var(--sub); margin-bottom:20px; line-height:1.7; }
  .gate-card input{ width:100%; padding:12px 14px; border:1.5px solid var(--line); border-radius:12px; font-size:14px; margin-bottom:10px; transition:border-color .15s; }
  .gate-card input:focus{ outline:none; border-color:var(--accent); }
  .gate-card button{ width:100%; padding:12px; background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; border:none; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; }
  .gate-card button:hover{ filter:brightness(1.06); }
  .gate-err{ color:var(--warn); font-size:12px; min-height:16px; margin-top:8px; }
  .lock{ font-size:34px; margin-bottom:10px; }
  header{ background:rgba(255,255,255,.86); backdrop-filter:blur(14px); border-bottom:1px solid rgba(228,232,238,.9); padding:14px 22px 12px; position:sticky; top:0; z-index:20; }
  .h-top{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  h1{ font-family:var(--font-head); font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  h1 small{ font-size:12px; color:var(--sub); font-weight:400; margin-left:2px; font-family:"Noto Sans JP",sans-serif; }
  .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-left:auto; }
  .seg{ display:inline-flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; background:#fff; box-shadow:var(--shadow-sm); }
  .seg button{ border:none; background:transparent; padding:7px 15px; cursor:pointer; font-size:12px; color:var(--sub); transition:background .15s,color .15s; }
  .seg button.active{ background:var(--accent); color:#fff; font-weight:700; }
  .seg.view button.active{ background:#0f172a; }
  input[type=search]{ padding:8px 14px; border:1px solid var(--line); border-radius:999px; font-size:12px; width:180px; background:#fff; box-shadow:var(--shadow-sm); transition:border-color .15s; }
  input[type=search]:focus{ outline:none; border-color:var(--accent); }
  .btn{ border:1px solid var(--line); background:#fff; padding:8px 14px; border-radius:999px; cursor:pointer; font-size:12px; color:var(--ink); box-shadow:var(--shadow-sm); transition:transform .12s, box-shadow .12s, background .12s; }
  .btn:hover{ background:#f8fafc; transform:translateY(-1px); box-shadow:0 4px 10px rgba(16,24,40,.08); }
  .btn.primary{ background:linear-gradient(135deg,#2563eb,#1d4ed8); color:#fff; border-color:transparent; font-weight:700; }
  .stats{ display:flex; gap:18px; margin-top:10px; font-size:12.5px; color:var(--sub); flex-wrap:wrap; align-items:center; }
  .stats b{ color:var(--ink); font-size:14.5px; }
  .hint{ color:var(--sub); }
  .legend{ display:flex; gap:14px; margin-top:10px; font-size:11.5px; color:var(--sub); flex-wrap:wrap; align-items:center; }
  .period{ margin-left:auto; background:var(--accent-soft); color:var(--accent); font-weight:700; padding:3px 12px; border-radius:999px; font-size:12px; }
  .period:empty{ display:none; }
  .legend .dot{ display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .legend .dot.futa{ background:var(--futa); }
  .legend .dot.yoga{ background:var(--yoga); }
  .legend .dot.un{ background:var(--unassigned); }
  .summary{ display:flex; gap:12px; margin-top:12px; flex-wrap:wrap; }
  .sumcard{ flex:1; min-width:150px; background:#fff; border:1px solid var(--line); border-radius:var(--r-md); padding:12px 14px; display:flex; align-items:center; gap:11px; box-shadow:var(--shadow-sm); }
  .sumcard .si{ width:40px; height:40px; min-width:40px; border-radius:12px; background:#eef2f7; display:flex; align-items:center; justify-content:center; font-size:19px; }
  .sumcard .sv{ font-family:var(--font-head); font-size:22px; font-weight:900; line-height:1.1; color:var(--ink); }
  .sumcard .sl{ font-size:11px; color:var(--sub); font-weight:600; margin-top:1px; }
  .sumcard.warn{ border-color:#f9a8d4; }
  .sumcard.warn .sv{ color:var(--unassigned); }
  .sumcard.warn .si{ background:var(--unassigned-soft); }
  .sumcard.ok .sv{ color:var(--ok); }
  .sumcard.ok .si{ background:var(--ok-soft); }
  .sumcard.clickable{ cursor:pointer; transition:transform .12s, box-shadow .12s; }
  .sumcard.clickable:hover{ transform:translateY(-2px); box-shadow:0 8px 20px rgba(16,24,40,.10); }
  .layout{ display:flex; gap:18px; padding:18px 22px 24px; align-items:flex-start; min-height:60vh; }
  .entity-list{ width:308px; min-width:264px; background:var(--panel); border:1px solid var(--line); border-radius:var(--r-lg); max-height:calc(100vh - 170px); overflow-y:auto; box-shadow:var(--shadow-md); }
  .erow{ padding:12px 14px; margin:4px 8px; border-radius:var(--r-sm); cursor:pointer; display:flex; align-items:center; gap:10px; transition:background .12s, box-shadow .12s; }
  .erow:hover{ background:#f4f7fb; }
  .erow.selected{ background:var(--accent-soft); box-shadow:inset 0 0 0 1.5px var(--accent); }
  .erow.unassigned.selected{ background:var(--unassigned-soft); box-shadow:inset 0 0 0 1.5px var(--unassigned); }
  .erow.drop-target{ outline:2px dashed var(--accent); background:var(--drop); }
  .avatar{ width:30px; height:30px; min-width:30px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; background:var(--accent); font-family:var(--font-head); box-shadow:0 2px 5px rgba(16,24,40,.15); }
  .erow .avatar.futa{ background:linear-gradient(135deg,var(--futa),#0b7d72); }
  .erow .avatar.yoga{ background:linear-gradient(135deg,var(--yoga),#7f1d1d); }
  .erow.unassigned .avatar{ background:linear-gradient(135deg,var(--unassigned),#9d174d); }
  .erow .ename{ font-weight:700; font-size:14px; flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:var(--font-head); }
  .erow .ecount{ font-size:11.5px; color:var(--sub); font-weight:700; min-width:16px; text-align:right; }
  .detail-panel{ flex:1; background:var(--panel); border:1px solid var(--line); border-radius:var(--r-lg); min-height:60vh; max-height:calc(100vh - 170px); display:flex; flex-direction:column; box-shadow:var(--shadow-md); overflow:hidden; }
  .detail-panel.drop-target{ outline:2px dashed var(--accent); }
  .detail-head{ flex:none; padding:18px 20px; color:#fff; background:linear-gradient(135deg,var(--accent),#1d4ed8); position:relative; overflow:hidden; }
  .detail-head::after{ content:""; position:absolute; right:-60px; top:-80px; width:230px; height:230px; border-radius:50%; background:rgba(255,255,255,.10); pointer-events:none; }
  .detail-panel.futa .detail-head{ background:linear-gradient(135deg,var(--futa),#0b7d72); }
  .detail-panel.yoga .detail-head{ background:linear-gradient(135deg,var(--yoga),#7f1d1d); }
  .detail-panel.unassigned .detail-head{ background:linear-gradient(135deg,var(--unassigned),#9d174d); }
  .detail-head .dname{ font-family:var(--font-head); font-weight:700; font-size:19px; display:flex; align-items:center; gap:10px; line-height:1.4; }
  .davatar{ width:42px; height:42px; min-width:42px; border-radius:50%; background:rgba(255,255,255,.22); box-shadow:inset 0 0 0 2px rgba(255,255,255,.5); display:inline-flex; align-items:center; justify-content:center; font-size:17px; font-weight:800; }
  .badge{ font-size:11px; padding:2px 10px; border-radius:999px; font-weight:700; background:rgba(255,255,255,.25); color:#fff; }
  .dmeta{ display:flex; gap:10px; margin-top:9px; font-size:12.5px; color:rgba(255,255,255,.92); align-items:center; flex-wrap:wrap; }
  .dmeta .load{ font-weight:700; }
  .unassigned-tag{ font-size:11px; font-weight:700; color:var(--unassigned); background:#fff; padding:2px 10px; border-radius:999px; display:inline-flex; align-items:center; gap:3px; }
  .detail-cards{ padding:16px; overflow-y:auto; flex:1; min-height:0; display:flex; flex-direction:column; gap:10px; background:#f7f9fc; }
  .card{ background:#fff; border:1px solid var(--line); border-left:4px solid var(--accent); border-radius:12px; padding:11px 13px; cursor:grab; transition:box-shadow .15s, transform .15s; display:flex; align-items:flex-start; gap:8px; box-shadow:var(--shadow-sm); }
  .card:hover{ box-shadow:0 8px 20px rgba(16,24,40,.12); transform:translateY(-2px); }
  .card.dragging{ opacity:.4; }
  .card.un{ border-left-color:var(--unassigned); background:#fff7fb; }
  .card .grip{ color:#c3ccd8; font-size:12px; line-height:1; margin-top:3px; cursor:grab; user-select:none; }
  .card .body{ flex:1; min-width:0; }
  .card .u{ font-weight:700; font-size:13.5px; font-family:var(--font-head); }
  .card .meta{ font-size:11.5px; color:var(--sub); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .card .v{ font-weight:700; color:var(--accent); }
  .cat{ display:inline-block; padding:1px 7px; border-radius:999px; background:#eef2f7; }
  .visit-dates{ margin-top:8px; padding-top:7px; border-top:1px dashed var(--line); }
  .date-label{ color:var(--sub); font-size:11px; font-weight:700; margin-bottom:5px; }
  .date-list{ display:flex; flex-wrap:wrap; gap:4px; }
  .date-chip{ display:inline-flex; align-items:center; padding:2px 7px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-size:10.5px; font-weight:700; }
  .date-none{ color:#9aa4b2; font-size:11px; }
  .schedule-panel{ padding:18px 22px 26px; }
  .schedule-shell{ max-width:1180px; margin:0 auto; }
  .schedule-toolbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:14px; }
  .schedule-nav{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
  .schedule-nav .period-label{ min-width:240px; text-align:center; font-family:var(--font-head); font-size:15px; font-weight:700; }
  .schedule-day{ background:#fff; border:1px solid var(--line); border-radius:var(--r-lg); overflow:hidden; box-shadow:var(--shadow-md); margin-bottom:14px; }
  .schedule-day-head{ display:flex; align-items:center; gap:9px; padding:13px 16px; background:#f8fafc; border-bottom:1px solid var(--line); }
  .schedule-day-head h3{ font-family:var(--font-head); font-size:15px; }
  .weekday{ display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:50%; background:var(--accent); color:#fff; font-weight:800; font-size:12px; }
  .weekday.sun{ background:#dc2626; }
  .weekday.sat{ background:#2563eb; }
  .day-count{ margin-left:auto; color:var(--sub); font-size:11.5px; font-weight:700; }
  .schedule-grid{ display:grid; grid-template-columns:120px minmax(140px,1.1fr) minmax(140px,1.1fr) minmax(220px,1.8fr) 100px; align-items:stretch; }
  .schedule-grid.header{ background:#f8fafc; color:var(--sub); font-size:10.5px; font-weight:700; border-bottom:1px solid var(--line); }
  .schedule-grid.row{ border-bottom:1px solid var(--line); }
  .schedule-grid.row:last-child{ border-bottom:none; }
  .schedule-cell{ min-width:0; padding:11px 13px; display:flex; align-items:center; gap:7px; }
  .schedule-grid.row .schedule-cell:not(:last-child){ border-right:1px solid #f0f2f5; }
  .schedule-time{ color:var(--accent); font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .schedule-person{ font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .schedule-service{ color:var(--ink); line-height:1.45; }
  .schedule-service small{ color:var(--sub); display:block; margin-top:2px; }
  .office-pill{ display:inline-flex; padding:3px 8px; border-radius:999px; color:#fff; font-size:10.5px; font-weight:700; white-space:nowrap; }
  .office-pill.yoga{ background:var(--yoga); }
  .office-pill.futa{ background:var(--futa); }
  .schedule-day-empty{ padding:22px 16px; text-align:center; color:#9aa4b2; font-size:12px; }
  .schedule-empty{ background:#fff; border:1px dashed #cbd5e1; border-radius:var(--r-lg); padding:48px 20px; text-align:center; color:var(--sub); }
  .schedule-empty strong{ display:block; color:var(--ink); font-family:var(--font-head); font-size:16px; margin-bottom:5px; }
  .suggest-btn{ border:none; background:var(--unassigned-soft); color:var(--unassigned); font-size:11px; font-weight:700; padding:5px 12px; border-radius:999px; cursor:pointer; margin-top:7px; transition:all .12s; }
  .suggest-btn:hover{ background:var(--unassigned); color:#fff; }
  .empty{ text-align:center; color:#c3ccd8; font-size:12px; padding:18px 4px; }
  .add-card{ width:100%; margin-top:2px; padding:9px; border:1.5px dashed #d5dce5; border-radius:12px; background:transparent; color:var(--sub); font-size:12px; cursor:pointer; transition:all .12s; }
  .add-card:hover{ background:#fff; color:var(--accent); border-color:var(--accent); }
  footer{ text-align:center; color:var(--sub); font-size:11px; padding:12px; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:rgba(17,24,39,.92); backdrop-filter:blur(6px); color:#fff; padding:10px 18px; border-radius:999px; font-size:12.5px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:50; box-shadow:0 10px 30px rgba(2,6,23,.35); }
  .toast.show{ opacity:1; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(15,23,42,.45); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:60; }
  .modal-card{ background:#fff; border-radius:18px; padding:24px 26px; width:320px; max-width:90vw; box-shadow:0 24px 60px rgba(2,6,23,.35); text-align:center; }
  .modal-title{ font-family:var(--font-head); font-weight:700; font-size:15px; margin-bottom:16px; line-height:1.5; }
  .modal-btns{ display:flex; gap:10px; margin-bottom:12px; }
  .office-btn{ flex:1; border:none; color:#fff; font-size:14px; font-weight:700; padding:14px 0; border-radius:12px; cursor:pointer; font-family:var(--font-head); transition:transform .12s, filter .12s; }
  .office-btn:hover{ transform:translateY(-2px); filter:brightness(1.08); }
  .office-btn.yoga{ background:linear-gradient(135deg,var(--yoga),#7f1d1d); }
  .office-btn.futa{ background:linear-gradient(135deg,var(--futa),#0b7d72); }
  .modal-cancel{ border:1px solid var(--line); background:#fff; color:var(--sub); font-size:12px; padding:8px 18px; border-radius:999px; cursor:pointer; }
  .modal-cancel:hover{ background:#f8fafc; }
  @media (max-width:780px){
    .layout{ flex-direction:column; }
    .entity-list{ width:100%; min-width:0; max-height:38vh; }
    .detail-panel{ width:100%; }
    .controls{ margin-left:0; }
    .schedule-panel{ padding:14px 12px 22px; }
    .schedule-nav{ width:100%; justify-content:center; }
    .schedule-nav .period-label{ order:-1; width:100%; min-width:0; }
    .schedule-grid.header{ display:none; }
    .schedule-grid.row{ display:grid; grid-template-columns:96px 1fr; padding:8px 10px; }
    .schedule-grid.row .schedule-cell{ padding:6px 7px; border-right:none!important; }
    .schedule-grid.row .schedule-cell:nth-child(3){ grid-column:2; }
    .schedule-grid.row .schedule-cell:nth-child(4){ grid-column:1/-1; border-top:1px dashed var(--line); margin-top:4px; }
    .schedule-grid.row .schedule-cell:last-child{ position:absolute; right:20px; margin-top:1px; }
    .schedule-grid.row{ position:relative; }
  }
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="lock">🔒</div>
    <h2>担当割り振り確認ツール</h2>
    <p>このページは関係者限定です。<br>共有されたパスワードを入力してください。</p>
    <input type="password" id="pw" placeholder="パスワード" autocomplete="off">
    <button id="unlockBtn">開く</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div id="app" style="display:none">
<header>
  <div class="h-top">
    <h1>訪問介護 担当割り振り確認ツール<small id="viewHint">利用者ごとに担当ヘルパーを組み換え</small></h1>
    <div class="controls">
      <div class="seg view" id="viewSeg">
        <button data-view="user" class="active">利用者ベース</button>
        <button data-view="helper">ヘルパーベース</button>
        <button data-view="schedule">予定表</button>
      </div>
      <input type="search" id="search" placeholder="名前で検索">
      <div class="seg" id="officeSeg">
        <button data-of="all" class="active">全事業所</button>
        <button data-of="用賀">用賀</button>
        <button data-of="二子玉川">二子玉川</button>
      </div>
      <button class="btn" id="addEntity">＋列を追加</button>
      <button class="btn" id="exportCsv">CSV出力</button>
      <button class="btn primary" id="exportJson">保存(JSON)</button>
      <button class="btn" id="importSchedule">シフトCSV取込</button>
      <button class="btn" id="resetBtn">初期化</button>
      <input type="file" id="scheduleFileInput" accept=".csv" style="display:none">
    </div>
  </div>
  <div class="legend">
    <span><span class="dot yoga"></span>用賀</span>
    <span><span class="dot futa"></span>二子玉川</span>
    <span><span class="dot un"></span>未配置（要注意）</span>
    <span class="period" id="period"></span>
  </div>
  <div class="summary" id="summary"></div>
  <div class="stats" id="stats"></div>
</header>
<div class="layout">
  <div class="entity-list" id="entityList"></div>
  <div class="detail-panel" id="detailPanel"></div>
</div>
<div class="schedule-panel" id="schedulePanel" style="display:none"></div>
<footer>変更は暗号化してこの端末のブラウザに自動保存されます。「保存(JSON)」でデータをファイルに書き出せます。</footer>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="officeModal" style="display:none">
  <div class="modal-card">
    <div class="modal-title" id="officeModalTitle">事業所を選択してください</div>
    <div class="modal-btns">
      <button class="office-btn yoga" data-office="用賀">用賀</button>
      <button class="office-btn futa" data-office="二子玉川">二子玉川</button>
    </div>
    <button class="modal-cancel" id="officeModalCancel">キャンセル</button>
  </div>

const STORE_KEY = "kaigo_assign_enc_v1";
let SEED=null, CK=null, state=null, officeFilter="all", query="", viewMode="user", selected=null;
let scheduleRange="today", scheduleAnchor=todayKey();
const $ = s=>document.querySelector(s);

function b64ToBytes(b){ const s=atob(b); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }
function bytesToB64(a){ let s=""; const u=new Uint8Array(a); for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]); return btoa(s); }
async function deriveKey(pw, salt, iters){
  const base=await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations:iters, hash:"SHA-256"}, base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function dec(key, ivB64, ctB64){ const pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(ivB64)}, key, b64ToBytes(ctB64)); return new TextDecoder().decode(pt); }
async function encStr(key, str){ const iv=crypto.getRandomValues(new Uint8Array(12)); const ct=await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, new TextEncoder().encode(str)); return {iv:bytesToB64(iv), ct:bytesToB64(ct)}; }

async function unlock(pw){
  let key, json;
  try{ key=await deriveKey(pw, b64ToBytes(ENC.salt), ENC.iters); json=await dec(key, ENC.iv, ENC.ct); }
  catch(e){ return false; }
  CK=key; SEED=JSON.parse(json);
  state=await loadState();
  $("#gate").style.display="none"; $("#app").style.display="";
  bindControls(); render();
  return true;
}
$("#unlockBtn").onclick=async()=>{ const pw=$("#pw").value; if(!pw)return; $("#gateErr").textContent="確認中…";
  const ok=await unlock(pw); if(!ok) $("#gateErr").textContent="パスワードが違います。"; };
$("#pw").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#unlockBtn").click(); });

function seedState(){
  const helpers=[], hseen=new Set(), users=[], useen=new Set();
  SEED.forEach(d=>{ const hk=d.office+"|"+d.helper; if(!hseen.has(hk)){hseen.add(hk);helpers.push({office:d.office,name:d.helper});}
    const uk=d.office+"|"+d.user; if(!useen.has(uk)){useen.add(uk);users.push({office:d.office,name:d.user});} });
  const assignments=SEED.map((d,i)=>({id:i+1,office:d.office,helper:d.helper,user:d.user,visits:d.visits||0,cat:d.cat||"",svc:d.svc||"",dates:normalizeVisitDates(d.dates||d.visitDates||[])}));
  return {helpers, users, assignments, schedule:[]};
}
function ensureUsers(st){
  if(!st.users){ const u=[],s=new Set(); st.assignments.forEach(a=>{const k=a.office+"|"+a.user; if(!s.has(k)){s.add(k);u.push({office:a.office,name:a.user});}}); st.users=u; }
  st.assignments.forEach(a=>{ a.dates=normalizeVisitDates(a.dates||a.visitDates||[]); });
  if(!Array.isArray(st.schedule))st.schedule=[];
  st.schedule=st.schedule.map(normalizeScheduleItem).filter(Boolean);
  return st;
}
async function loadState(){
  try{ const s=localStorage.getItem(STORE_KEY); if(s){ const o=JSON.parse(s); const pt=await dec(CK,o.iv,o.ct); const d=JSON.parse(pt); if(d.helpers&&d.assignments) return ensureUsers(d); } }catch(e){}
  return seedState();
}
async function save(){ try{ const o=await encStr(CK, JSON.stringify(state)); localStorage.setItem(STORE_KEY, JSON.stringify(o)); }catch(e){} }

function reconcile(){
  const hset=new Set(state.helpers.map(h=>h.office+"|"+h.name));
  const uset=new Set(state.users.map(u=>u.office+"|"+u.name));
  state.assignments.forEach(a=>{
    const hk=a.office+"|"+a.helper; if(!hset.has(hk)){hset.add(hk); state.helpers.push({office:a.office,name:a.helper});}
    const uk=a.office+"|"+a.user; if(!uset.has(uk)){uset.add(uk); state.users.push({office:a.office,name:a.user});}
  });
}
function officeBadge(of){ const cls=of==="二子玉川"?"futa":of==="用賀"?"yoga":"un"; return `<span class="badge ${cls}">${of}</span>`; }

function render(){
  reconcile();
  if(viewMode==="schedule"){ renderSchedule(); return; }
  $(".layout").style.display="flex";
  $("#schedulePanel").style.display="none";
  $("#addEntity").style.display="";
  const listEl=$("#entityList"); const detailEl=$("#detailPanel");
  listEl.innerHTML=""; const q=query.trim();
  const dim = viewMode;
  const other = dim==="helper" ? "user" : "helper";
  let cols = (dim==="helper" ? state.helpers : state.users).filter(e=> officeFilter==="all"||e.office===officeFilter);
  const officeOrder={"用賀":0,"二子玉川":1};
  cols.sort((a,b)=>{ const au=a.name==="未配置"?1:0,bu=b.name==="未配置"?1:0; if(au!==bu)return au-bu;
    if(a.office!==b.office)return (officeOrder[a.office]??99)-(officeOrder[b.office]??99); return a.name.localeCompare(b.name,"ja"); });
  if(!selected || !cols.some(e=>e.office===selected.office && e.name===selected.name)){
    selected = cols[0] ? {office:cols[0].office, name:cols[0].name} : null;
  }
  let totalVisits=0;
  const rows=[];
  cols.forEach(e=>{
    const items=state.assignments.filter(a=> a.office===e.office && a[dim]===e.name);
    const visitsSum=items.reduce((s,a)=>s+(a.visits||0),0); totalVisits+=visitsSum;
    const n=items.length;
    const isUn = e.name==="未配置";
    rows.push({e, items, visitsSum, n, isUn});
  });
  rows.forEach(rd=>{
    const e=rd.e;
    const matchCol=!q||e.name.includes(q);
    const matchItem=q && rd.items.some(a=>a[other].includes(q));
    if(q && !matchCol && !matchItem) return;
    const officeCls = e.office==="二子玉川"?"futa":e.office==="用賀"?"yoga":"";
    const isSel = selected && selected.office===e.office && selected.name===e.name;
    const row=document.createElement("div");
    row.className="erow"+(officeCls?" "+officeCls:"")+(rd.isUn?" unassigned":"")+(isSel?" selected":"");
    const countLabel = dim==="helper" ? `担当 ${rd.n}名・訪問 ${rd.visitsSum}回` : `ヘルパー ${rd.n}名・訪問 ${rd.visitsSum}回`;
    const init=rd.isUn?"⚠":(e.name||"？").trim().charAt(0);
    row.innerHTML=`<span class="avatar ${officeCls}">${init}</span><div class="ename" title="${e.name}（${countLabel}）">${e.name}</div><span class="ecount">${rd.n}</span>`;
    row.addEventListener("click",()=>{ selected={office:e.office,name:e.name}; render(); });
    row.addEventListener("dragover",ev=>{ ev.preventDefault(); row.classList.add("drop-target"); });
    row.addEventListener("dragleave",ev=>{ if(!row.contains(ev.relatedTarget)) row.classList.remove("drop-target"); });
    row.addEventListener("drop",ev=>{ ev.preventDefault(); row.classList.remove("drop-target");
      const id=+ev.dataTransfer.getData("text/plain"); const a=state.assignments.find(x=>x.id===id); if(!a)return;

function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),1800); }
function pickOffice(title){

    $("#officeModalCancel").onclick=()=>done(null);

function normDate(s){ const m=String(s||"").trim().match(/^(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/); if(!m)return null;
  const y=+m[1], mo=+m[2], d=+m[3], dt=new Date(Date.UTC(y,mo-1,d));
  if(dt.getUTCFullYear()!==y||dt.getUTCMonth()!==mo-1||dt.getUTCDate()!==d)return null;
  return m[1]+"/"+("0"+m[2]).slice(-2)+"/"+("0"+m[3]).slice(-2); }
function fmtPeriodDate(s){ const m=s.match(/(\d{4})\/(\d{2})\/(\d{2})/); return m? `${+m[2]}月${+m[3]}日` : s; }
function fmtVisitDate(s){ const m=String(s||"").match(/(\d{4})\/(\d{2})\/(\d{2})/); return m? `${+m[1]}/${+m[2]}/${+m[3]}` : s; }
function esc(s){ return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function dateToKey(d){ return d.getFullYear()+"/"+("0"+(d.getMonth()+1)).slice(-2)+"/"+("0"+d.getDate()).slice(-2); }
function keyToDate(key){ const m=String(key||"").match(/(\d{4})\/(\d{2})\/(\d{2})/); return m?new Date(+m[1],+m[2]-1,+m[3],12):new Date(); }
function todayKey(){ return dateToKey(new Date()); }
function addDays(key,n){ const d=keyToDate(key); d.setDate(d.getDate()+n); return dateToKey(d); }
function startOfWeek(key){ const d=keyToDate(key), offset=(d.getDay()+6)%7; d.setDate(d.getDate()-offset); return dateToKey(d); }
function weekdayName(key){ return ["日","月","火","水","木","金","土"][keyToDate(key).getDay()]; }
function fmtFullDate(key,withWeekday=true){ const d=keyToDate(key), base=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; return withWeekday?`${base}（${weekdayName(key)}）`:base; }
function normTime(value){
  const s=String(value??"").trim(); if(!s)return "";
  if(/^0?\.\d+$/.test(s)){ const mins=Math.round(+s*24*60); return ("0"+Math.floor(mins/60)%24).slice(-2)+":"+("0"+mins%60).slice(-2); }
  let m=s.match(/(?:^|\s)(\d{1,2})\s*[:：時]\s*(\d{1,2})/);
  if(!m&&/^\d{3,4}$/.test(s)){ m=[s,""+Math.floor(+s/100),s.slice(-2)]; }
  if(!m)return ""; const h=+m[1], min=+m[2]; if(h>23||min>59)return "";
  return ("0"+h).slice(-2)+":"+("0"+min).slice(-2);
}
function timeRange(value){
  const found=[...String(value??"").matchAll(/(\d{1,2})\s*[:：時]\s*(\d{1,2})/g)].map(m=>normTime(`${m[1]}:${m[2]}`)).filter(Boolean);
  return {start:found[0]||"",end:found[1]||""};
}
function normalizeScheduleItem(s){
  if(!s)return null; const date=normDate(s.date||s.visitDate||s.serviceDate); if(!date)return null;
  return {office:String(s.office||""),user:String(s.user||"未配置"),helper:String(s.helper||"未配置"),date,start:normTime(s.start),end:normTime(s.end),cat:String(s.cat||""),svc:String(s.svc||"")};
}
function scheduleSortTime(s){ return s.start||"99:99"; }
function timeToMinutes(s){ const m=String(s||"").match(/(\d{2}):(\d{2})/); return m?+m[1]*60+(+m[2]):null; }
function visitMinutes(s){ const a=timeToMinutes(s.start),b=timeToMinutes(s.end); return a!==null&&b!==null&&b>a?b-a:0; }
function normalizeVisitDates(values){
  const src=Array.isArray(values)?values:[];
  return [...new Set(src.map(normDate).filter(Boolean))].sort();
}

function headerIndex(header,candidates){
  for(const name of candidates){ const i=header.indexOf(name); if(i>=0)return i; }
  return -1;
}

function parseCSV(text){
  const rows=[]; let row=[]; let field=""; let inQuotes=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(inQuotes){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; } else field+=c; }
    else if(c==='"') inQuotes=true;
    else if(c===','){ row.push(field); field=""; }
    else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; }
    else if(c==='\r'){ /* skip */ }
    else field+=c;
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.length>1||r[0]!=="");
}
async function importScheduleCsv(file){
  const buf=await file.arrayBuffer();
  let text=new TextDecoder("shift-jis").decode(buf);
  if(!text.includes("利用者")) text=new TextDecoder("utf-8").decode(buf);
  if(!text.includes("利用者")){ toast("対応していないCSV形式です"); return; }
  const rows=parseCSV(text);
  if(rows.length<2){ toast("CSVの内容を読み取れませんでした"); return; }
  const header=rows[0].map(h=>String(h||"").replace(/^﻿/,"").trim());
  const iUser=headerIndex(header,["利用者名","利用者"]), iHelper=headerIndex(header,["スタッフ名","ヘルパー名","担当者名"]),
        iCat=headerIndex(header,["サービス分類"]), iSvc=headerIndex(header,["サービス名","主なサービス名"]),
        iDate=headerIndex(header,["サービス日付","サービス日","訪問日","提供日","実施日"]),
        iStart=headerIndex(header,["サービス開始時刻","サービス開始時間","開始時刻","開始時間","訪問開始時刻","訪問開始時間","提供開始時刻"]),
        iEnd=headerIndex(header,["サービス終了時刻","サービス終了時間","終了時刻","終了時間","訪問終了時刻","訪問終了時間","提供終了時刻"]),
        iTime=headerIndex(header,["サービス時間","訪問時間","提供時間","時間帯"]);
  if(iUser<0||iHelper<0){ toast("対応していないCSV形式です"); return; }
  if(iDate<0){ toast("CSVに訪問日の列が見つかりません"); return; }
  let of=officeFilter;
  if(of==="all"){ of=await pickOffice("このCSVはどちらの事業所のデータですか？"); if(!of)return; }
  const map=new Map(), scheduleRows=[];
  let minDate=null, maxDate=null;
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; if(!row)continue;
    const user=(row[iUser]||"").trim(), helper=(row[iHelper]||"").trim()||"未配置";
    if(!user)continue;
    const visitDate=iDate>=0?normDate(row[iDate]):null;
    if(visitDate){ if(!minDate||visitDate<minDate)minDate=visitDate; if(!maxDate||visitDate>maxDate)maxDate=visitDate; }
    const range=iTime>=0?timeRange(row[iTime]):{start:"",end:""};
    const start=(iStart>=0?normTime(row[iStart]):"")||range.start;
    const end=(iEnd>=0?normTime(row[iEnd]):"")||range.end;
    const cat=(row[iCat]||"").trim(), svc=(row[iSvc]||"").trim();
    if(visitDate)scheduleRows.push({office:of,user,helper,date:visitDate,start,end,cat,svc});
    const key=helper+" "+user;
    if(!map.has(key)) map.set(key,{helper,user,visits:0,cat,svc,dates:[]});
    const item=map.get(key); item.visits++;
    if(visitDate&&!item.dates.includes(visitDate)) item.dates.push(visitDate);
  }
  if(map.size===0){ toast("取り込めるデータが見つかりませんでした"); return; }
  if(minDate&&maxDate){ const p=state.period||{};
    state.period={ from:(p.from&&p.from<minDate)?p.from:minDate, to:(p.to&&p.to>maxDate)?p.to:maxDate }; }
  let nextId=(state.assignments.reduce((m,a)=>Math.max(m,a.id),0)||0)+1, added=0, updated=0;
  map.forEach(v=>{
    const existing=state.assignments.find(a=>a.office===of&&a.helper===v.helper&&a.user===v.user);
    if(existing){ existing.visits=v.visits; if(iDate>=0)existing.dates=normalizeVisitDates(v.dates); if(v.cat)existing.cat=v.cat; if(v.svc)existing.svc=v.svc; updated++; }
    else { state.assignments.push({id:nextId++, office:of, helper:v.helper, user:v.user, visits:v.visits, cat:v.cat, svc:v.svc, dates:normalizeVisitDates(v.dates)}); added++; }
  });
  if(minDate&&maxDate){
    state.schedule=(state.schedule||[]).map(normalizeScheduleItem).filter(Boolean).filter(s=>!(s.office===of&&s.date>=minDate&&s.date<=maxDate));
    state.schedule.push(...scheduleRows.map(normalizeScheduleItem).filter(Boolean));
    if(scheduleAnchor<minDate||scheduleAnchor>maxDate)scheduleAnchor=minDate;
  }
  save(); render();
  const timeNote=scheduleRows.some(s=>s.start)?"":"・訪問時間の列は未取得";
  toast(`CSVを取り込みました（予定${scheduleRows.length}件${timeNote}）`);
}

function addCard(e){

  const id=(state.assignments.reduce((m,a)=>Math.max(m,a.id),0)||0)+1;
  const a={id, office:e.office, visits:v, cat:"", svc:"", dates:[]}; a[dim]=e.name; a[other]=name;
  state.assignments.push(a); save(); render(); toast(`${e.name} に ${name} を追加`);
}
async function addEntity(){
  const isH=viewMode==="helper"; const label=isH?"ヘルパー":"利用者";
  const name=prompt(`追加する${label}名を入力してください`); if(!name)return;
  let of=officeFilter; if(of==="all"){ of=await pickOffice(`「${name}」さんをどちらの事業所に追加しますか？`); if(!of)return; }
  const arr=isH?state.helpers:state.users;
  if(arr.some(e=>e.office===of&&e.name===name)){ toast("既に登録済みです"); return; }
  arr.push({office:of,name}); save(); render(); toast(`${label}「${name}」を追加`);
}
function download(name,content){ const bl=new Blob([content],{type:"text/plain;charset=utf-8"}); const u=URL.createObjectURL(bl);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

function bindControls(){
  $("#viewSeg").addEventListener("click",e=>{ const btn=e.target.closest("button"); if(!btn)return;
    $("#viewSeg .active").classList.remove("active"); btn.classList.add("active"); viewMode=btn.dataset.view;
    $("#viewHint").textContent = viewMode==="user" ? "利用者ごとに担当ヘルパーを組み換え" : viewMode==="helper" ? "ヘルパーごとに担当利用者を組み換え" : "訪問予定を日付・曜日・時間順に確認";
    $("#search").placeholder=viewMode==="schedule"?"名前・サービスで検索":"名前で検索";
    render(); });
  $("#officeSeg").addEventListener("click",e=>{ const b=e.target.closest("button"); if(!b)return;
    $("#officeSeg .active").classList.remove("active"); b.classList.add("active"); officeFilter=b.dataset.of; render(); });
  $("#search").addEventListener("input",e=>{ query=e.target.value; render(); });
  $("#addEntity").onclick=addEntity;
  $("#resetBtn").onclick=()=>{ if(confirm("すべてのデータ（取り込んだCSV・手動での変更・初期割り当て）を消して、空の状態にします。よろしいですか？")){ state={helpers:[],users:[],assignments:[],schedule:[]}; save(); render(); toast("すべてのデータを消去しました"); } };
  $("#exportJson").onclick=()=>{ download("担当割振り.json", JSON.stringify(state,null,2)); toast("JSONを書き出しました"); };
  $("#exportCsv").onclick=()=>{ const rows=[["事業所","ヘルパー","利用者","訪問回数","訪問日一覧","サービス分類","主なサービス名"]];
    state.assignments.slice().sort((a,b)=>a.office.localeCompare(b.office,"ja")||a.user.localeCompare(b.user,"ja"))
      .forEach(a=>rows.push([a.office,a.helper,a.user,a.visits,normalizeVisitDates(a.dates).join("・"),a.cat,a.svc]));
    const csv="﻿"+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
    download("担当割振り.csv", csv); toast("CSVを書き出しました"); };
  $("#importSchedule").onclick=()=>$("#scheduleFileInput").click();
  $("#scheduleFileInput").onchange=e=>{ const f=e.target.files[0]; if(!f)return; importScheduleCsv(f); e.target.value=""; };
}
</script>
</body>
</html>
